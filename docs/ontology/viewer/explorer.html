<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Energy Domain Ontology Explorer</title>
  <style>
    :root { --bg:#f7f7f8; --panel:#fff; --text:#1f2937; --muted:#667085; --border:#d0d5dd; --soft:#eaecf0; --chip:#eef2f6; --selected:#e8f0f7; --accent:#175cd3; --sidebar:360px; }
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.45}
    .app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh} aside{background:var(--panel);border-right:1px solid var(--border);height:100vh;overflow:auto;padding:14px 10px 20px;position:sticky;top:0} main{height:100vh;overflow:auto;padding:20px 32px 48px}
    h1{font-size:1.25rem;margin:0 0 12px 4px} h2{font-size:1.8rem;margin:0 0 8px} h3{font-size:1.05rem;margin:0 0 10px} a{color:var(--accent);text-decoration:none}.muted{color:var(--muted)}
    .search{margin:0 0 14px;padding:0 4px}.search input{width:100%;border:1px solid var(--border);border-radius:10px;padding:9px 10px;font:inherit;background:#fff}.tree{font-size:.94rem}.tree-node{margin:1px 0}.tree-row{display:grid;grid-template-columns:22px 1fr;align-items:center;gap:2px;border-radius:8px;min-height:28px;padding-right:6px}.tree-row:hover{background:var(--chip)}.tree-row.selected{background:var(--selected);font-weight:650}.tree-toggle{border:0;background:transparent;cursor:pointer;color:var(--muted);width:22px;height:26px;padding:0}.tree-toggle.empty{visibility:hidden}.tree-label{border:0;background:transparent;text-align:left;padding:5px 4px;cursor:pointer;color:var(--text);font:inherit;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tree-children{margin-left:18px;border-left:1px solid var(--soft);padding-left:4px}.tree-node.collapsed>.tree-children{display:none}
    .topbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.button{border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 10px;cursor:pointer;font:inherit}.detail-header,.section{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px}.kind{display:inline-flex;border-radius:999px;background:var(--chip);color:#344054;padding:4px 10px;font-size:.88rem;margin-bottom:12px}.iri{font-size:.9rem;color:var(--muted);word-break:break-all;margin-top:12px}.sections{display:grid;gap:16px;max-width:1050px}.item{border-left:3px solid var(--soft);background:#fcfcfd;border-radius:8px;padding:10px 12px;margin:8px 0}.item-title{font-weight:650}.item-value{color:var(--muted);word-break:break-word}.empty{color:var(--muted);background:var(--panel);border:1px dashed var(--border);border-radius:12px;padding:18px}
    @media(max-width:900px){.app{grid-template-columns:1fr}aside{height:auto;position:static;max-height:55vh}main{height:auto;padding:18px}}
  </style>
</head>
<body>
  <div class="app"><aside><h1 id="viewer-title">EDO Explorer</h1><div class="search"><input id="tree-search" type="search" placeholder="Search tree..." /></div><nav id="tree" class="tree"></nav></aside><main><div class="topbar"><a class="button" href="./index.html">Viewer home</a><a class="button" href="./architecture.html">Architecture view</a></div><section id="detail"></section></main></div>
  <script>
    const DATA_URL = "./data/viewer-explorer-data.json";
    let viewerData = null;
    function esc(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
    function renderTreeNode(node){const children=node.children||[];const has=children.length>0;return '<div class="tree-node" data-node-id="'+esc(node.id)+'"><div class="tree-row" data-node-id="'+esc(node.id)+'"><button type="button" class="tree-toggle '+(has?'':'empty')+'">'+(has?'▾':'')+'</button><button type="button" class="tree-label" title="'+esc(node.label)+'">'+esc(node.label)+'</button></div>'+(has?'<div class="tree-children">'+children.map(renderTreeNode).join('')+'</div>':'')+'</div>';}
    function renderTree(){const tree=document.getElementById('tree');tree.innerHTML=(viewerData.navigation||[]).map(renderTreeNode).join('');tree.querySelectorAll('.tree-toggle').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();const n=b.closest('.tree-node');if(!n)return;n.classList.toggle('collapsed');b.textContent=n.classList.contains('collapsed')?'▸':'▾';});});tree.querySelectorAll('.tree-label').forEach(function(b){b.addEventListener('click',function(){const row=b.closest('.tree-row');if(row)selectNode(row.dataset.nodeId);});});}
    function itemHtml(item){return '<article class="item"><div class="item-title">'+esc(item.label)+'</div>'+(item.value?'<div class="item-value">'+esc(item.value)+'</div>':'')+(item.iri?'<div class="item-value">'+esc(item.iri)+'</div>':'')+'</article>';}
    function renderDetail(id){const box=document.getElementById('detail');const n=viewerData.nodes[id];if(!n){box.innerHTML='<div class="detail-header"><span class="kind">Missing node</span><h2>'+esc(id)+'</h2><p class="muted">No detail data was found for this node.</p></div>';return;}let sections='';(n.sections||[]).forEach(function(s){sections+='<section class="section"><h3>'+esc(s.label||s.id)+'</h3>'+((s.items||[]).length?(s.items||[]).map(itemHtml).join(''):'<div class="empty">No items.</div>')+'</section>';});box.innerHTML='<div class="detail-header">'+(n.kind?'<div class="kind">'+esc(n.kind)+'</div>':'')+'<h2>'+esc(n.label||n.id)+'</h2>'+(n.description?'<p>'+esc(n.description)+'</p>':'')+(n.iri?'<div class="iri">'+esc(n.iri)+'</div>':'')+'</div><div class="sections">'+(sections||'<div class="empty">Select a more specific node to see details.</div>')+'</div>';}
    function selectNode(id){document.querySelectorAll('.tree-row').forEach(function(r){r.classList.toggle('selected',r.dataset.nodeId===id);});renderDetail(id);}
    function collapseAll(){document.querySelectorAll('.tree-node').forEach(function(n){n.classList.add('collapsed');});document.querySelectorAll('.tree-toggle:not(.empty)').forEach(function(b){b.textContent='▸';});const root=document.querySelector('.tree-node[data-node-id="root"]');if(root){root.classList.remove('collapsed');const b=root.querySelector('.tree-toggle');if(b)b.textContent='▾';}}
    function initSearch(){const input=document.getElementById('tree-search');input.addEventListener('input',function(){const q=input.value.trim().toLowerCase();document.querySelectorAll('.tree-node').forEach(function(n){n.style.display='';});if(!q)return;document.querySelectorAll('.tree-node').forEach(function(n){const label=(n.querySelector('.tree-label')||{}).textContent||'';if(!label.toLowerCase().includes(q)){const child=Array.from(n.querySelectorAll('.tree-label')).some(function(c){return c.textContent.toLowerCase().includes(q);});n.style.display=child?'':'none';if(child)n.classList.remove('collapsed');}});});}
    fetch(DATA_URL).then(function(r){if(!r.ok)throw new Error('Could not load '+DATA_URL);return r.json();}).then(function(data){viewerData=data;document.getElementById('viewer-title').textContent=data.metadata&&data.metadata.title?data.metadata.title:'EDO Explorer';renderTree();collapseAll();initSearch();selectNode('root');}).catch(function(e){document.getElementById('detail').innerHTML='<div class="detail-header"><span class="kind">Error</span><h2>Could not load explorer data</h2><p>'+esc(e.message)+'</p></div>';});
  </script>
</body>
</html>
